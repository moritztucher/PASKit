# SwiftLint configuration — PASKit
# Aligned with the studio-wide style (matches AnalyticsDashboard's .swiftlint.yml).

# What to lint
included:
  - Sources

excluded:
  - .build
  - .swiftpm
  - DerivedData
  - "**/.build"
  - "**/.swiftpm"
  - "**/Build"

# Rule tuning
line_length:
  warning: 130
  error: 160
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: false
  ignores_interpolated_strings: true

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - to
    - in

type_name:
  min_length:
    warning: 3
  max_length:
    warning: 50
    error: 60

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

# Disabled rules — opinions we don't agree with
disabled_rules:
  - todo
  - trailing_comma
  - multiple_closures_with_trailing_closure

# Opt-in rules — enabled in addition to the defaults
opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - yoda_condition

reporter: "xcode"
