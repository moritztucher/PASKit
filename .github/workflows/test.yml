name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-build:
    name: Swift Build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve packages
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: |
          if [ -d "Tests" ]; then
            swift test
          else
            echo "No Tests/ directory yet — skipping. Add tests under Tests/ to enable."
          fi

  ios-simulator-build:
    name: iOS Simulator Build
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        scheme: [PASKitCore, PASKitLifecycle, PASKitAnalytics]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build ${{ matrix.scheme }} for iOS Simulator
        run: |
          xcodebuild \
            -scheme ${{ matrix.scheme }} \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build/derived \
            -skipPackagePluginValidation \
            build
